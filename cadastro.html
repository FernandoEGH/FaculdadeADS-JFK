<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1>JFK Turismo</h1>
        <ul>
            <li><a href="index.html">Voltar</a></li>
        </ul>
    </nav>
</header>
    <main class="form-page">
    <div class="form-box1">
        <h2>Cadastro de novo usuário</h2>

        <form>
            <label>Nome completo:</label>
            <input type="text" required>

            <label>E-mail:</label>
            <input type="email" required>

            <label>Data de nascimento:</label>
            <input type="date" required>

            <label>Estado:</label>
            <select required>
                <option value="">Selecione</option>
                 <option value="AC">AC</option>
                 <option value="AL">AL</option>
                 <option value="AP">AP</option>
                 <option value="AM">AM</option>
                 <option value="BA">BA</option>
                 <option value="CE">CE</option>
                 <option value="DF">DF</option>
                 <option value="ES">ES</option>
                 <option value="GO">GO</option>
                 <option value="MA">MA</option>
                 <option value="MS">MS</option>
                 <option value="MT">MT</option>
                 <option value="MG">MG</option>
                 <option value="PA">PA</option>
                 <option value="PB">PB</option>
                 <option value="PR">PR</option>
                 <option value="PE">PE</option>
                 <option value="PI">PI</option>
                 <option value="RJ">RJ</option>
                 <option value="RN">RN</option>
                 <option value="RS">RS</option>
                 <option value="RO">RO</option>
                 <option value="RR">RR</option>
                 <option value="SC">SC</option>
                 <option value="SP">SP</option>
                 <option value="SE">SE</option>
                 <option value="TO">TO</option>
            </select>

            <label>Endereço:</label>
            <input type="text" required>

            <label>Sexo:</label>
            <select required>
                <option value="">Selecione</option>
                <option>Masculino</option>
                <option>Feminino</option>
            </select>

            <label>Categorias de interesse:</label>
            <div class="inline-options">
                <label><input type="checkbox"> Campo</label>
                <label><input type="checkbox"> Cidade</label>
                <label><input type="checkbox"> Internacionais</label>
                <label><input type="checkbox"> Nacionais</label>
                <label><input type="checkbox"> Montanhismo</label>
                <label><input type="checkbox"> Serra</label>
                <label><input type="checkbox"> Praia</label>
            </div>
            <br>
            <label>Login:</label>
            <input type="text" required>

            <label>Senha:</label>
            <input type="password" required>

            <div class="botoes-form">
                <button type="reset">Limpar</button>
                <a href="pagamento.html"><button type="button">Salvar</button></a>
            </div>
        </form>
    </div>
    </main>
<footer>
    <p>&copy; 2026 JFK Turismo</p>
</footer>

</body>
</html>
