<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Informações de pagamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1>JFK Turismo</h1>
        <ul>
            <li><a href="index.html">Voltar</a></li>
        </ul>
    </nav>
</header>
    <main class="form-page">
            <div class="form-box2">
        <h2>Informações de Pagamento</h2>

        <form>
            <label>Nome completo:</label>
            <input type="text" placeholder="Escrava o nome como no cartão" required>
            <label>CPF/CNPJ:</label>
            <input type="text"placeholder="000.000.000-00" required>
            <label>Número do Cartão:</label>
            <input type="email"placeholder="0000 0000 0000 0000" required>
            <label>Validade:</label>
            <input type="date" required>
            <label>CVV:</label>
            <input type="password"placeholder="000" required>
            <div class="botoes-form">
                <button type="reset">Limpar</button>
                <a href="compra.html"><button type="button">Salvar</button></a>
            </div>
        </form>
    </div>
    </main>
<footer>
    <p>&copy; 2026 JFK Turismo</p>
</footer>

</body>
</html>
